<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">
  <link rel="icon" type="image/png" href="{{ "/assets/round_icon.png" | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
</head>
<body>

  <nav class="topbar">
    <div class="topbar-inner">
      <a class="site-name" href="{{ "/" | relative_url }}">{{ site.title }}</a>
      <div class="topbar-links">
        <a href="https://github.com/jardimdanificado" target="_blank" rel="noopener">github</a>
      </div>
    </div>
  </nav>

  <main class="site-wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">&copy; {{ site.time | date: "%Y" }} <span>{{ site.title }}</span></p>
    </div>
  </footer>

</body>
</html>
